<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flag Game</title>

<style>
body {
    font-family: Arial;
    background: #eef2f7;
    margin: 0;
}

/* CONTAINER PRINCIPAL */
.game {
    max-width: 1000px;
    margin: 30px auto;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
    text-align: center;
}

/* TITULO */
h2 {
    margin-bottom: 10px;
}

/* BANDEIRA */
.flag img {
    width: 260px;
    height: 170px;
    object-fit: cover;
    border-radius: 12px;
    margin: 20px 0;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* CARDS */
.container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 20px auto;
    max-width: 600px;
}

.card {
    padding: 12px;
    border-radius: 10px;
    background: #34495e;
    color: white;
    cursor: grab;
    font-weight: bold;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.05);
}

/* DROP ZONES */
.drop-area {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 20px;
}

.box {
    width: 220px;
}

.drop-zone {
    height: 100px;
    border: 2px dashed #bbb;
    border-radius: 10px;
    background: #fafafa;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

/* BOTÃO */
button {
    margin-top: 25px;
    padding: 12px 30px;
    border: none;
    border-radius: 10px;
    background: #27ae60;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #219150;
}

/* SCORE */
.score {
    margin-top: 15px;
    font-size: 18px;
}

/* POPUP */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: white;
    padding: 25px 50px;
    border-radius: 12px;
    font-size: 22px;
    box-shadow: 0 0 25px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.popup.show {
    transform: translate(-50%, -50%) scale(1);
}
</style>
</head>

<body>

<div class="game">

<h2>Drag the correct Country and Nationality</h2>

<div class="flag" id="flag"></div>

<div class="container" id="cards"></div>

<div class="drop-area">
    <div class="box">
        <h3>Country</h3>
        <div class="drop-zone" id="countryZone"></div>
    </div>

    <div class="box">
        <h3>Nationality</h3>
        <div class="drop-zone" id="nationalityZone"></div>
    </div>
</div>

<button onclick="checkAnswer()">Check</button>

<div class="score" id="score">Score: 0</div>

</div>

<div class="popup" id="popup"></div>

<script>
let dragged = null;
let score = 0;
let index = 0;

const data = [
{code:"br", country:"Brazil", nationality:"Brazilian"},
{code:"jp", country:"Japan", nationality:"Japanese"},
{code:"fr", country:"France", nationality:"French"},
{code:"it", country:"Italy", nationality:"Italian"},
{code:"de", country:"Germany", nationality:"German"},
{code:"es", country:"Spain", nationality:"Spanish"},
{code:"ca", country:"Canada", nationality:"Canadian"},
{code:"cn", country:"China", nationality:"Chinese"},
{code:"in", country:"India", nationality:"Indian"},
{code:"mx", country:"Mexico", nationality:"Mexican"},
{code:"ar", country:"Argentina", nationality:"Argentinian"},
{code:"pt", country:"Portugal", nationality:"Portuguese"},
{code:"ru", country:"Russia", nationality:"Russian"},
{code:"au", country:"Australia", nationality:"Australian"},
{code:"eg", country:"Egypt", nationality:"Egyptian"},
{code:"tr", country:"Turkey", nationality:"Turkish"},
{code:"se", country:"Sweden", nationality:"Swedish"},
{code:"no", country:"Norway", nationality:"Norwegian"},
{code:"gr", country:"Greece", nationality:"Greek"},
{code:"nl", country:"Netherlands", nationality:"Dutch"},
{code:"us", country:"USA", nationality:"American"},
{code:"gb", country:"UK", nationality:"British"},
{code:"cl", country:"Chile", nationality:"Chilean"},
{code:"co", country:"Colombia", nationality:"Colombian"},
{code:"pe", country:"Peru", nationality:"Peruvian"},
{code:"za", country:"South Africa", nationality:"South African"},
{code:"kr", country:"South Korea", nationality:"Korean"},
{code:"sa", country:"Saudi Arabia", nationality:"Saudi"},
{code:"ie", country:"Ireland", nationality:"Irish"},
{code:"ch", country:"Switzerland", nationality:"Swiss"}
];

data.sort(() => Math.random() - 0.5);

function loadRound() {
    if (index >= data.length) {
        showPopup("Game finished! Score: " + score);
        return;
    }

    const current = data[index];

    document.getElementById("flag").innerHTML =
        `<img src="https://flagcdn.com/w320/${current.code}.png">`;

    document.getElementById("countryZone").innerHTML = "";
    document.getElementById("nationalityZone").innerHTML = "";

    const cardsDiv = document.getElementById("cards");
    cardsDiv.innerHTML = "";

    let options = [current.country, current.nationality];

    while (options.length < 6) {
        let random = data[Math.floor(Math.random() * data.length)];
        let option = Math.random() > 0.5 ? random.country : random.nationality;

        if (!options.includes(option)) {
            options.push(option);
        }
    }

    options.sort(() => Math.random() - 0.5);

    options.forEach(text => {
        let div = document.createElement("div");
        div.className = "card";
        div.innerText = text;
        div.draggable = true;

        div.addEventListener("dragstart", () => dragged = div);

        cardsDiv.appendChild(div);
    });
}

document.querySelectorAll(".drop-zone").forEach(zone => {
    zone.addEventListener("dragover", e => e.preventDefault());

    zone.addEventListener("drop", () => {
        if (dragged) {
            zone.innerHTML = "";
            zone.appendChild(dragged);
        }
    });
});

function checkAnswer() {
    const current = data[index];

    let country = document.getElementById("countryZone").innerText;
    let nationality = document.getElementById("nationalityZone").innerText;

    if (country === current.country && nationality === current.nationality) {
        score++;
        document.getElementById("score").innerText = "Score: " + score;

        showPopup("It's correct 🎉");

        index++;
        setTimeout(loadRound, 1200);
    } else {
        showPopup("It's wrong ❌");
    }
}

function showPopup(message) {
    const popup = document.getElementById("popup");
    popup.innerText = message;
    popup.classList.add("show");

    setTimeout(() => {
        popup.classList.remove("show");
    }, 1500);
}

loadRound();
</script>

</body>
</html>
