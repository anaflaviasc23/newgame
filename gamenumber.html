<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Number Game</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f6f8;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CONTAINER PRINCIPAL */
.game {
  background: white;
  padding: 30px;
  width: 800px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  text-align: center;
}

/* TOPO */
.top-bar {
  display: flex;
  justify-content: flex-end;
  font-size: 20px;
}

/* NÍVEIS */
.levels {
  margin-top: 10px;
}

.level-btn {
  padding: 8px 15px;
  margin: 5px;
  cursor: pointer;
  border-radius: 8px;
  border: none;
  background: #ddd;
}

.active {
  background: #2ecc71;
  color: white;
}

/* PALAVRA */
.word {
  font-size: 48px;
  margin: 40px 0;
  font-weight: bold;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 15px;
}

.btn {
  padding: 18px;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  font-size: 18px;
  cursor: pointer;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.05);
}

.correct { background: #2ecc71 !important; }
.wrong { background: #e74c3c !important; }

.c1{background:#8e44ad}.c2{background:#e67e22}.c3{background:#3498db}
.c4{background:#9b59b6}.c5{background:#f39c12}.c6{background:#1abc9c}
.c7{background:#34495e}.c8{background:#27ae60}.c9{background:#16a085}.c10{background:#2980b9}

/* GAME OVER */
.overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.85);
  color:white;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  border-radius:15px;
}

.overlay h1 {
  font-size: 40px;
}

.overlay button {
  margin-top:20px;
  padding:12px 25px;
  border:none;
  background:#2ecc71;
  color:white;
  font-size:18px;
  cursor:pointer;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="game">

  <div class="top-bar">
    <div id="hud">❤️❤️❤️ ✔ 0</div>
  </div>

  <div class="levels">
    <button class="level-btn active" onclick="setLevel(1)" id="lvl1">Nível 1</button>
    <button class="level-btn" onclick="setLevel(2)" id="lvl2">Nível 2</button>
  </div>

  <div class="word" id="word"></div>

  <div class="grid" id="grid"></div>

  <div class="overlay" id="gameOver">
    <h1>You lose 😢</h1>
    <p>Try again?</p>
    <button onclick="restartGame()">Restart</button>
  </div>

</div>

<!-- SONS -->
<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="gameOverSound" src="https://www.soundjay.com/misc/sounds/fail-buzzer-01.mp3"></audio>

<script>
const grid = document.getElementById("grid");
const wordEl = document.getElementById("word");
const hud = document.getElementById("hud");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const gameOverSound = document.getElementById("gameOverSound");

let correctNumber;
let score = 0;
let lives = 3;
let level = 1;

// números
const numbersText = {
1:"One",2:"Two",3:"Three",4:"Four",5:"Five",
6:"Six",7:"Seven",8:"Eight",9:"Nine",10:"Ten",
11:"Eleven",12:"Twelve",13:"Thirteen",14:"Fourteen",15:"Fifteen",
16:"Sixteen",17:"Seventeen",18:"Eighteen",19:"Nineteen",20:"Twenty",
21:"Twenty-one",22:"Twenty-two",23:"Twenty-three",24:"Twenty-four",25:"Twenty-five",
26:"Twenty-six",27:"Twenty-seven",28:"Twenty-eight",29:"Twenty-nine",30:"Thirty"
};

// HUD
function updateHUD(){
  hud.innerHTML = "❤️".repeat(lives) + ` ✔ ${score}`;
}

// trocar nível
function setLevel(lvl){
  level = lvl;
  document.getElementById("lvl1").classList.remove("active");
  document.getElementById("lvl2").classList.remove("active");
  document.getElementById("lvl"+lvl).classList.add("active");
  newRound();
}

// nova rodada
function newRound(){
  correctNumber = Math.floor(Math.random()*30)+1;

  wordEl.textContent = level === 1 
    ? correctNumber 
    : numbersText[correctNumber];

  let options = new Set([correctNumber]);

  while(options.size < 10){
    options.add(Math.floor(Math.random()*30)+1);
  }

  let shuffled = Array.from(options).sort(()=>Math.random()-0.5);

  grid.innerHTML = "";

  shuffled.forEach((num,i)=>{
    const btn = document.createElement("div");
    btn.className = "btn c"+((i%10)+1);

    btn.textContent = level === 1 
      ? numbersText[num] 
      : num;

    btn.onclick = ()=>handleClick(btn,num);

    grid.appendChild(btn);
  });
}

// clique
function handleClick(btn,num){
  if(num === correctNumber){
    btn.classList.add("correct");
    correctSound.play();

    setTimeout(()=>{
      score++;
      updateHUD();
      newRound();
    },400);

  } else {
    btn.classList.add("wrong");
    wrongSound.play();

    setTimeout(()=>{
      loseLife();
    },400);
  }
}

// vida
function loseLife(){
  lives--;
  updateHUD();

  if(lives<=0){
    gameOverSound.play();
    document.getElementById("gameOver").style.display="flex";
  } else {
    newRound();
  }
}

// restart
function restartGame(){
  score = 0;
  lives = 3;
  updateHUD();
  document.getElementById("gameOver").style.display="none";
  newRound();
}

// start
updateHUD();
newRound();
</script>

</body>
</html>
